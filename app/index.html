<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFFBF2">
<meta name="google" content="notranslate">
<title>dichos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" href="./icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div id="app">

  <header>
    <h1 translate="no">dichos</h1>
    <div class="sync-bar">
      <button class="study-btn" id="study-btn" hidden>study</button>
      <div class="sync-status" id="sync-status">connecting…</div>
      <button class="purge-btn" id="purge-btn" hidden>purge</button>
    </div>
  </header>

  <section class="ask">
    <div class="ask-header">
      <div class="ask-label">ask</div>
      <div class="mode-toggle" id="mode-toggle">
        <button class="mode-btn active" data-mode="en2es">EN → ES</button>
        <button class="mode-btn" data-mode="es2en">ES → EN</button>
      </div>
    </div>
    <input id="ask-input" type="text" autocomplete="off" placeholder="what do I say in Spanish when…">
    <div class="ask-status" id="ask-status"></div>
  </section>

  <section id="pending" class="pending"></section>

  <div class="filter-bar">
    <input id="filter-input" type="text" autocomplete="off" placeholder="filter saved phrases…">
    <div class="filter-tags" id="filter-tags"></div>
  </div>

  <section id="list" class="list">
    <!-- saved phrases render here -->
  </section>

  <section id="study" class="study" hidden></section>

</div>

<script src="./config.js"></script>
<script type="module" src="./main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
  <script async data-id="101502386" src="//static.getclicky.com/js"></script>
</body>
</html>
