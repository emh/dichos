name = "dichos-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"
workers_dev = true

[dev]
port = 8046

[vars]
ALLOWED_ORIGINS = "http://localhost:8044,http://127.0.0.1:8044"

[[durable_objects.bindings]]
name = "PHRASEBOOK"
class_name = "Phrasebook"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Phrasebook"]
